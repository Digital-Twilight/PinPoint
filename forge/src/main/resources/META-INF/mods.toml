modLoader = "javafml"
loaderVersion = "${forge_loader_version_range}"
license = "${license}"
clientSideOnly=true

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
displayURL="https://www.curseforge.com/minecraft/mc-mods/pinpoint"
logoFile = "${mod_id}.png"
credits = "${credits}"
authors = "${mod_author}"
description = '''${description}'''

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[${forge_version},)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId="xaerominimap"
mandatory=true
versionRange="[25.0,)"
ordering="NONE"
side="CLIENT"

[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="${mod_id}.forge.mixins.json"